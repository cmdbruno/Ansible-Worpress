---
- hosts: all
  tasks:
    - name: Install Dependency
      ansible.builtin.apt:
        pkg:
        - apache2
        - ghostscript
        - libapache2-mod-php
        - mysql-server
        - php
        - php-mysql
        - php-bcmath
        - php-curl
        - php-imagick
        - php-mbstring
        - php-xml
        - php-zip
        - php-intl
        - php-json
        state: latest
        update_cache: yes
      become: yes